<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="h1body" cx="42%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#152238"/>
      <stop offset="55%" stop-color="#0a1122"/>
      <stop offset="100%" stop-color="#05070f"/>
    </radialGradient>
    <radialGradient id="h1lure" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7e0"/>
      <stop offset="30%" stop-color="#ffd36b"/>
      <stop offset="70%" stop-color="#ffab2e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffab2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="h1eye" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#eaffff"/>
      <stop offset="45%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="h1tooth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaffff"/>
      <stop offset="100%" stop-color="#8fe9ff"/>
    </linearGradient>
    <filter id="h1soft" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="h1big" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- lure halo (largest, gold, the hero glow) -->
  <g id="lureGlow">
    <circle cx="150" cy="52" r="34" fill="url(#h1lure)" filter="url(#h1big)"/>
  </g>

  <!-- body silhouette -->
  <g id="body">
    <path d="M110 78
             C 66 78 40 108 40 146
             C 40 190 78 214 120 214
             C 168 214 202 188 202 148
             C 202 120 186 100 160 90
             C 146 84 130 78 110 78 Z"
          fill="url(#h1body)" stroke="#0a1526" stroke-width="2"/>
    <!-- cyan rim light along top-left edge -->
    <path d="M110 80 C 74 80 48 108 46 142"
          fill="none" stroke="#00e5ff" stroke-width="3" stroke-linecap="round" opacity="0.85" filter="url(#h1soft)"/>
    <path d="M110 80 C 74 80 48 108 46 142"
          fill="none" stroke="#baf6ff" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>
    <!-- teal underbelly glow -->
    <path d="M74 196 C 100 210 150 208 178 190"
          fill="none" stroke="#23f0c7" stroke-width="3" stroke-linecap="round" opacity="0.6" filter="url(#h1soft)"/>
  </g>

  <!-- gaping mouth + fang line -->
  <g id="mouth">
    <path d="M78 150 C 100 138 150 138 176 152
             C 168 182 132 196 122 196
             C 108 196 86 182 78 150 Z"
          fill="#04060d" stroke="#0a1526" stroke-width="1.5"/>
    <!-- upper fangs -->
    <path d="M84 150 l7 15 5 -14 8 15 6 -15 9 15 6 -15 9 14 6 -14 8 14 6 -13"
          fill="url(#h1tooth)" opacity="0.95"/>
    <!-- lower fangs -->
    <path d="M96 190 l6 -13 6 12 6 -12 7 12 6 -12 6 12 6 -12"
          fill="url(#h1tooth)" opacity="0.85"/>
    <path d="M78 150 C 100 138 150 138 176 152" fill="none" stroke="#8fe9ff" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- eyes -->
  <g id="eyes">
    <circle cx="92" cy="120" r="13" fill="url(#h1eye)"/>
    <circle cx="150" cy="118" r="13" fill="url(#h1eye)"/>
    <circle cx="92" cy="120" r="4.5" fill="#eaffff"/>
    <circle cx="150" cy="118" r="4.5" fill="#eaffff"/>
  </g>

  <!-- illicium (lure rod) + bulb -->
  <g id="lure">
    <path d="M120 92 C 128 70 140 58 150 54"
          fill="none" stroke="#1a2740" stroke-width="4" stroke-linecap="round"/>
    <path d="M120 92 C 128 70 140 58 150 54"
          fill="none" stroke="#ffd36b" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
    <circle cx="150" cy="52" r="12" fill="url(#h1lure)"/>
    <circle cx="150" cy="52" r="5" fill="#fff7e0"/>
    <!-- filament sparks off the lure -->
    <g stroke="#ffd36b" stroke-width="1.2" opacity="0.8" stroke-linecap="round">
      <path d="M150 40 l0 -8"/>
      <path d="M162 48 l7 -4"/>
      <path d="M138 48 l-7 -4"/>
    </g>
  </g>
</svg>
