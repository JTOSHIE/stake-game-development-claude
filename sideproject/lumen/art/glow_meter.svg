<svg width="120" height="320" viewBox="0 0 120 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gmFill" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#eaffff"/>
      <stop offset="18%" stop-color="#00e5ff"/>
      <stop offset="55%" stop-color="#23f0c7"/>
      <stop offset="100%" stop-color="#7a8bff"/>
    </linearGradient>
    <linearGradient id="gmFrame" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e1830"/>
      <stop offset="50%" stop-color="#060a16"/>
      <stop offset="100%" stop-color="#0e1830"/>
    </linearGradient>
    <radialGradient id="gmCap" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#8ff4ff"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="gmSoft" x="-80%" y="-40%" width="260%" height="180%"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="gmBig" x="-120%" y="-60%" width="340%" height="220%"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>

  <!-- outer glow of the whole column -->
  <rect x="34" y="40" width="52" height="256" rx="26" fill="url(#gmFill)" opacity="0.22" filter="url(#gmBig)"/>

  <!-- tube frame -->
  <rect x="40" y="44" width="40" height="248" rx="20" fill="url(#gmFrame)" stroke="#1b2a48" stroke-width="2"/>
  <rect x="40" y="44" width="40" height="248" rx="20" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.35"/>

  <!-- segmented fill (bottom bright, thinning toward the top) -->
  <g id="segments">
    <!-- eight glowing segments from the base -->
    <g>
      <rect x="46" y="270" width="28" height="16" rx="6" fill="url(#gmFill)"/>
      <rect x="46" y="248" width="28" height="16" rx="6" fill="url(#gmFill)"/>
      <rect x="46" y="226" width="28" height="16" rx="6" fill="url(#gmFill)"/>
      <rect x="46" y="204" width="28" height="16" rx="6" fill="url(#gmFill)"/>
      <rect x="46" y="182" width="28" height="16" rx="6" fill="url(#gmFill)"/>
    </g>
    <!-- upper unlit segments (dim outlines) -->
    <g fill="none" stroke="#23f0c7" stroke-width="1.4" opacity="0.35">
      <rect x="46" y="160" width="28" height="16" rx="6"/>
      <rect x="46" y="138" width="28" height="16" rx="6"/>
      <rect x="46" y="116" width="28" height="16" rx="6"/>
      <rect x="46" y="94" width="28" height="16" rx="6"/>
      <rect x="46" y="72" width="28" height="16" rx="6"/>
    </g>
  </g>

  <!-- lit-portion soft bloom -->
  <rect x="46" y="182" width="28" height="104" rx="8" fill="url(#gmFill)" opacity="0.5" filter="url(#gmSoft)"/>

  <!-- side tick marks (level notches) -->
  <g stroke="#8ff4ff" stroke-width="1.4" opacity="0.55" stroke-linecap="round">
    <path d="M84 190 l8 0"/><path d="M84 146 l8 0"/><path d="M84 102 l8 0"/>
    <path d="M28 190 l8 0"/><path d="M28 146 l8 0"/><path d="M28 102 l8 0"/>
  </g>

  <!-- glow orb cap at the top (the collected-light indicator, no text) -->
  <g id="cap">
    <circle cx="60" cy="34" r="26" fill="url(#gmCap)" filter="url(#gmSoft)"/>
    <circle cx="60" cy="34" r="13" fill="#eaffff"/>
    <circle cx="60" cy="34" r="13" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.7"/>
    <circle cx="56" cy="30" r="4" fill="#ffffff"/>
    <!-- three little rays -->
    <g stroke="#8ff4ff" stroke-width="1.6" stroke-linecap="round" opacity="0.8">
      <path d="M60 4 l0 -0.5"/><path d="M86 20 l4 -2"/><path d="M34 20 l-4 -2"/>
    </g>
  </g>

  <!-- base plinth -->
  <rect x="34" y="292" width="52" height="14" rx="6" fill="#0e1830" stroke="#1b2a48" stroke-width="1.5"/>
</svg>
