<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="l2body" cx="46%" cy="34%" r="76%">
      <stop offset="0%" stop-color="#1a1226"/>
      <stop offset="55%" stop-color="#0d0a18"/>
      <stop offset="100%" stop-color="#05070f"/>
    </radialGradient>
    <radialGradient id="l2mag" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd6fb"/>
      <stop offset="45%" stop-color="#ff3df0"/>
      <stop offset="100%" stop-color="#ff3df0" stop-opacity="0"/>
    </radialGradient>
    <filter id="l2soft" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="l2big" x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>

  <!-- faint magenta halo (low symbol, subtle) -->
  <path d="M60 168 C 96 120 140 80 190 60" fill="none" stroke="url(#l2mag)"
        stroke-width="30" stroke-linecap="round" opacity="0.14" filter="url(#l2big)"/>

  <!-- curled body: tail low-left, head upper-right -->
  <g id="body">
    <path d="M58 176
             C 44 150 50 120 74 104
             C 104 84 140 76 172 74
             C 156 88 130 96 108 112
             C 92 124 84 142 88 162
             C 96 158 108 156 118 162
             C 104 172 78 188 58 176 Z"
          fill="url(#l2body)" stroke="#0d0a18" stroke-width="2"/>
    <!-- segment lines with magenta edge -->
    <g fill="none" stroke="#ff3df0" stroke-width="1.4" opacity="0.5">
      <path d="M96 110 C 100 128 98 146 92 160"/>
      <path d="M112 100 C 116 118 114 136 108 150"/>
      <path d="M128 92 C 132 108 130 124 126 138"/>
    </g>
    <!-- back rim light -->
    <path d="M74 104 C 104 84 140 76 172 74" fill="none" stroke="#ff3df0" stroke-width="2"
          stroke-linecap="round" opacity="0.6" filter="url(#l2soft)"/>
    <path d="M74 104 C 104 84 140 76 172 74" fill="none" stroke="#ffd6fb" stroke-width="1.1"
          stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- tail fan -->
  <g id="tail">
    <path d="M58 176 C 44 184 36 196 34 208 C 46 200 56 196 66 194
             C 58 202 54 210 52 218 C 66 206 78 194 88 188 Z"
          fill="url(#l2body)" stroke="#ff3df0" stroke-width="1.3" opacity="0.85"/>
  </g>

  <!-- rostrum, antennae + eye -->
  <g id="head">
    <path d="M172 74 C 186 66 198 60 210 58" fill="none" stroke="#ffd6fb" stroke-width="1.6"
          stroke-linecap="round" opacity="0.85"/>
    <g fill="none" stroke="#ff3df0" stroke-width="1.3" stroke-linecap="round" opacity="0.6">
      <path d="M168 80 C 190 84 208 96 224 116"/>
      <path d="M170 88 C 188 98 200 116 208 140"/>
    </g>
    <circle cx="160" cy="88" r="5.5" fill="url(#l2mag)"/>
    <circle cx="160" cy="88" r="2.2" fill="#ffe6fb"/>
    <!-- little legs -->
    <g stroke="#ff3df0" stroke-width="1.2" stroke-linecap="round" opacity="0.5">
      <path d="M108 120 L112 140"/><path d="M122 110 L128 130"/><path d="M136 100 L142 120"/>
    </g>
  </g>
</svg>
