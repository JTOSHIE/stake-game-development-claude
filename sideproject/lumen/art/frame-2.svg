<svg width="800" height="640" viewBox="0 0 800 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fmMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101a30"/>
      <stop offset="30%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#141f38"/>
      <stop offset="100%" stop-color="#05070f"/>
    </linearGradient>
    <linearGradient id="fmBevel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a5c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a1120" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="fmNode" cx="42%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#eaffff"/>
      <stop offset="45%" stop-color="#57e8ff"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="fmSoft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="fmBig" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>

  <!-- outer cyan bloom of the whole rig -->
  <rect x="40" y="40" width="720" height="560" rx="44" fill="none"
        stroke="#00e5ff" stroke-width="20" opacity="0.16" filter="url(#fmBig)"/>

  <!-- dark deep-sea metal body (hollow: reels show through the centre) -->
  <rect x="40" y="40" width="720" height="560" rx="42" fill="none"
        stroke="url(#fmMetal)" stroke-width="62"/>
  <!-- outer + inner bevel highlights -->
  <rect x="12" y="12" width="776" height="616" rx="58" fill="none"
        stroke="url(#fmBevel)" stroke-width="2" opacity="0.7"/>
  <rect x="72" y="72" width="656" height="496" rx="26" fill="none"
        stroke="#0a1120" stroke-width="2" opacity="0.8"/>

  <!-- bright bioluminescent neon tube tracing the inner window -->
  <rect x="80" y="80" width="640" height="480" rx="26" fill="none"
        stroke="#00e5ff" stroke-width="16" opacity="0.5" filter="url(#fmSoft)"/>
  <rect x="80" y="80" width="640" height="480" rx="26" fill="none"
        stroke="#57e8ff" stroke-width="5" opacity="0.95"/>
  <rect x="80" y="80" width="640" height="480" rx="26" fill="none"
        stroke="#eaffff" stroke-width="1.6" opacity="0.8"/>

  <!-- faint teal secondary tube on the outer metal lip -->
  <rect x="30" y="30" width="740" height="580" rx="48" fill="none"
        stroke="#23f0c7" stroke-width="1.6" opacity="0.28"/>

  <!-- corner rig nodes (glowing rivets) -->
  <g id="nodes">
    <g transform="translate(80 80)"><circle r="16" fill="url(#fmNode)" filter="url(#fmSoft)"/><circle r="5" fill="#eaffff"/><circle r="8" fill="none" stroke="#00e5ff" stroke-width="1.6" opacity="0.7"/></g>
    <g transform="translate(720 80)"><circle r="16" fill="url(#fmNode)" filter="url(#fmSoft)"/><circle r="5" fill="#eaffff"/><circle r="8" fill="none" stroke="#00e5ff" stroke-width="1.6" opacity="0.7"/></g>
    <g transform="translate(80 560)"><circle r="16" fill="url(#fmNode)" filter="url(#fmSoft)"/><circle r="5" fill="#eaffff"/><circle r="8" fill="none" stroke="#00e5ff" stroke-width="1.6" opacity="0.7"/></g>
    <g transform="translate(720 560)"><circle r="16" fill="url(#fmNode)" filter="url(#fmSoft)"/><circle r="5" fill="#eaffff"/><circle r="8" fill="none" stroke="#00e5ff" stroke-width="1.6" opacity="0.7"/></g>
  </g>

  <!-- mid-side accent rivets (subtle, deep-sea rig detail) -->
  <g fill="url(#fmNode)" opacity="0.85">
    <circle cx="400" cy="30" r="7" filter="url(#fmSoft)"/>
    <circle cx="400" cy="610" r="7" filter="url(#fmSoft)"/>
    <circle cx="20" cy="320" r="7" filter="url(#fmSoft)"/>
    <circle cx="780" cy="320" r="7" filter="url(#fmSoft)"/>
  </g>
  <g fill="#eaffff" opacity="0.9">
    <circle cx="400" cy="30" r="2.2"/><circle cx="400" cy="610" r="2.2"/>
    <circle cx="20" cy="320" r="2.2"/><circle cx="780" cy="320" r="2.2"/>
  </g>
</svg>
