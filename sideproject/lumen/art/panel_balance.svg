<svg width="340" height="90" viewBox="0 0 340 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pbPlate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1830"/>
      <stop offset="55%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#05070f"/>
    </linearGradient>
    <filter id="pbSoft" x="-40%" y="-60%" width="180%" height="220%"><feGaussianBlur stdDeviation="3.5"/></filter>
    <filter id="pbBig" x="-40%" y="-80%" width="180%" height="260%"><feGaussianBlur stdDeviation="9"/></filter>
  </defs>
  <!-- cyan rim bloom -->
  <rect x="12" y="12" width="316" height="66" rx="22" fill="none" stroke="#00e5ff" stroke-width="6" opacity="0.22" filter="url(#pbBig)"/>
  <!-- dark plate (numbers print over this) -->
  <rect x="12" y="12" width="316" height="66" rx="22" fill="url(#pbPlate)" stroke="#16233f" stroke-width="1.5"/>
  <!-- cyan rim -->
  <rect x="12" y="12" width="316" height="66" rx="22" fill="none" stroke="#00e5ff" stroke-width="3" opacity="0.45" filter="url(#pbSoft)"/>
  <rect x="12" y="12" width="316" height="66" rx="22" fill="none" stroke="#57e8ff" stroke-width="1.4" opacity="0.8"/>
  <!-- top sheen -->
  <path d="M28 18 H312" stroke="#eaffff" stroke-width="1.2" opacity="0.14"/>
  <!-- corner glow pips -->
  <g fill="#8ff4ff" opacity="0.8">
    <circle cx="30" cy="45" r="2.4" filter="url(#pbSoft)"/>
    <circle cx="310" cy="45" r="2.4" filter="url(#pbSoft)"/>
  </g>
</svg>
