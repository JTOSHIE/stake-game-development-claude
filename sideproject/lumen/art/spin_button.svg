<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="spDisc" cx="42%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#12203c"/>
      <stop offset="55%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#05070f"/>
    </radialGradient>
    <radialGradient id="spSwirl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eaffff"/>
      <stop offset="35%" stop-color="#00e5ff"/>
      <stop offset="70%" stop-color="#23f0c7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#23f0c7" stop-opacity="0"/>
    </radialGradient>
    <filter id="spSoft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="spBig" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="11"/></filter>
  </defs>

  <!-- outer bloom -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#00e5ff" stroke-width="10" opacity="0.32" filter="url(#spBig)"/>
  <!-- dark disc -->
  <circle cx="100" cy="100" r="84" fill="url(#spDisc)" stroke="#16233f" stroke-width="2"/>
  <!-- top inner sheen -->
  <ellipse cx="88" cy="62" rx="40" ry="18" fill="#ffffff" opacity="0.07"/>
  <!-- bright cyan ring glow (primary action) -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#00e5ff" stroke-width="6" opacity="0.55" filter="url(#spSoft)"/>
  <circle cx="100" cy="100" r="76" fill="none" stroke="#8ff4ff" stroke-width="2.4"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#23f0c7" stroke-width="1.2" opacity="0.4"/>

  <!-- central bioluminescent whirl (no baked text) -->
  <circle cx="100" cy="100" r="46" fill="url(#spSwirl)" opacity="0.55" filter="url(#spSoft)"/>
  <g fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M100 100 C 100 82 120 78 130 92 C 141 108 128 132 104 132" stroke="#00e5ff" stroke-width="6"/>
    <path d="M100 100 C 100 118 80 122 70 108 C 59 92 72 68 96 68" stroke="#23f0c7" stroke-width="6"/>
  </g>
  <g fill="none" stroke="#eaffff" stroke-width="1.6" stroke-linecap="round" opacity="0.75">
    <path d="M100 100 C 100 82 120 78 130 92 C 141 108 128 132 104 132"/>
    <path d="M100 100 C 100 118 80 122 70 108 C 59 92 72 68 96 68"/>
  </g>
  <circle cx="100" cy="100" r="6" fill="#eaffff"/>
</svg>
