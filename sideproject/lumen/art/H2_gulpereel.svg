<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="h2body" cx="40%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#181026"/>
      <stop offset="55%" stop-color="#0c0a1a"/>
      <stop offset="100%" stop-color="#05070f"/>
    </radialGradient>
    <radialGradient id="h2mag" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd6fb"/>
      <stop offset="35%" stop-color="#ff3df0"/>
      <stop offset="100%" stop-color="#ff3df0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="h2throat" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#ff3df0" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#8a1a8f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8a1a8f" stop-opacity="0"/>
    </radialGradient>
    <filter id="h2soft" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="h2big" x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="11"/></filter>
  </defs>

  <!-- tail-tip lure glow -->
  <circle cx="196" cy="196" r="20" fill="url(#h2mag)" filter="url(#h2big)"/>

  <!-- whip tail -->
  <g id="tail">
    <path d="M120 150 C 150 168 176 176 194 194"
          fill="none" stroke="url(#h2body)" stroke-width="12" stroke-linecap="round"/>
    <path d="M120 150 C 150 168 176 176 194 194"
          fill="none" stroke="#ff3df0" stroke-width="2" stroke-linecap="round" opacity="0.55" filter="url(#h2soft)"/>
    <circle cx="196" cy="196" r="8" fill="url(#h2mag)"/>
    <circle cx="196" cy="196" r="3.4" fill="#ffe6fb"/>
  </g>

  <!-- enormous pelican jaw -->
  <g id="jaw">
    <!-- lower jaw pouch -->
    <path d="M40 96 C 30 150 70 196 128 176 C 150 168 150 150 138 138
             C 120 150 78 150 58 120 C 50 108 44 100 40 96 Z"
          fill="url(#h2body)" stroke="#0d0a1a" stroke-width="2"/>
    <path d="M40 96 C 30 150 70 196 126 178" fill="none" stroke="#ff3df0" stroke-width="2.6"
          stroke-linecap="round" opacity="0.8" filter="url(#h2soft)"/>
    <path d="M40 96 C 30 150 70 196 126 178" fill="none" stroke="#ffd6fb" stroke-width="1.2"
          stroke-linecap="round" opacity="0.9"/>
    <!-- throat glow inside the pouch -->
    <ellipse cx="86" cy="150" rx="34" ry="24" fill="url(#h2throat)"/>
    <!-- upper jaw -->
    <path d="M40 96 C 60 70 108 62 150 78 C 168 86 176 100 172 112
             C 150 96 96 92 60 116 C 50 106 44 100 40 96 Z"
          fill="url(#h2body)" stroke="#0d0a1a" stroke-width="2"/>
    <path d="M40 96 C 60 70 108 62 150 78 C 168 86 176 100 172 112" fill="none"
          stroke="#ff3df0" stroke-width="2.4" stroke-linecap="round" opacity="0.7" filter="url(#h2soft)"/>
    <path d="M40 96 C 60 70 108 62 150 78" fill="none" stroke="#ffd6fb" stroke-width="1.2" opacity="0.85"/>
  </g>

  <!-- hinge + eye -->
  <g id="head">
    <circle cx="44" cy="98" r="6" fill="url(#h2mag)"/>
    <circle cx="44" cy="98" r="2.6" fill="#ffe6fb"/>
  </g>

  <!-- tiny fang line along the gape -->
  <g id="fangs" fill="#ffd6fb" opacity="0.85">
    <path d="M62 108 l4 8 4 -7 4 8 4 -7 4 8 4 -7 4 8 4 -7 4 8"/>
  </g>
</svg>
